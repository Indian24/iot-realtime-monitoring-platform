kind = "mobile"
previewPath = "/"
title = "Smart RO Mobile"
version = "1.0.0"
id = "artifacts/smart-ro-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 24592

[services.development]
run = "pnpm --filter @workspace/smart-ro-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smart-ro-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/smart-ro-mobile", "run", "serve" ]

[services.env]
PORT = "24592"
BASE_PATH = "/"
